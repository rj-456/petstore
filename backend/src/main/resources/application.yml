server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: petstore-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:petstore}?sslmode=${DB_SSL_MODE:disable}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:petstore}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:petstore}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
